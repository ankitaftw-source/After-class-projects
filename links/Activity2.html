<!DOCTYPE html>
<html>
    <head>
        <title>List in html</title>
    </head>
    <body>
        <h1>ordered list</h1>
        <ol>
            <li>AARYIKA</li>
            <Li>HARSHALI</Li>
            <li>ISHU</li>
            <li>SAMPREETHI</li>
        </ol>
        <h1>unordered list</h1>
        <ul>
           <li>AARYIKA</li>
            <Li>HARSHALI</Li>
            <li>ISHU</li>
            <li>SAMPREETHI</li>  
        </ul>
        <h1>defination list</h1>
        <dl>
            <dt>tea</dt>
            <dd>-hot drinks</dd>
            <dt>coffee</dt>
            <dd>-hot/cold</dd>
        </dl>
    </body>
</html>
