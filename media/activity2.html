<!DOCTYPE html>
<html>
    <head>
        <title>Audio and video in HTML</title>
    </head>
    <body>
        <h1>Audio in HTML</h1>
        <audio controls autoplay>
            <source src="1.mp3" type="audio/mp3">
        </audio>
        <h1>video in html</h1>
        <video controls autoplay width="400" height="300" loop>
            <source src="Demo.mp4" type="video/mp4">
        </video>
    </body>
</html>
